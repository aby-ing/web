spring.application.name=restaurant-order-system
server.port=8080

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/restaurant_order?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:123456}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Shanghai
logging.level.org.hibernate.SQL=warn

# OpenAI-compatible Agent configuration.
ai.openai.enabled=true
ai.openai.api-key=${OPENAI_API_KEY:sk-a7c1ce0e393fb869dcda6fb8cb7794b925584c002250769fb403747073d6ce74}
ai.openai.base-url=https://openapi.junliai.org
ai.openai.api-type=chat
ai.openai.model=${OPENAI_MODEL:gpt-5.4-mini}
ai.openai.max-output-tokens=500
ai.openai.timeout-seconds=8
