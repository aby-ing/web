<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>后台 - 校园餐厅点餐系统</title>
    <link rel="stylesheet" href="/styles.css">
    <script defer src="/app.js"></script>
</head>
<body data-page="admin" data-auth="true" data-admin="true">
<header class="topbar">
    <a class="brand" href="/order.html"><span class="brand-mark">食</span><div><strong>校园餐厅点餐系统</strong><small>Restaurant Order System</small></div></a>
    <nav class="nav-tabs" aria-label="主导航">
        <a class="nav-btn" href="/order.html">点餐</a>
        <a class="nav-btn" href="/orders.html">订单</a>
        <a class="nav-btn" href="/reviews.html">评价</a>
        <a class="nav-btn" href="/ai.html">AI 助手</a>
        <a class="nav-btn admin-only active" href="/admin.html">后台</a>
    </nav>
    <div class="top-actions"><div class="user-chip" id="userChip">未登录</div><button class="ghost-btn" type="button" id="logoutBtn">退出</button><button class="danger-btn admin-only" type="button" id="shutdownBtn">停止服务</button></div>
</header>
<main class="page-shell">
    <div class="admin-grid">
        <section class="admin-panel">
            <h1>分类管理</h1>
            <form class="inline-form" id="categoryForm">
                <input id="categoryName" placeholder="分类名称">
                <input id="categorySort" type="number" value="0">
                <label class="check-label"><input id="categoryEnabled" type="checkbox" checked>启用</label>
                <button class="primary-btn" type="submit" id="categorySaveBtn">保存</button>
                <button class="ghost-btn" type="button" id="categoryResetBtn">重置</button>
            </form>
            <div class="table-wrap">
                <table><thead><tr><th>名称</th><th>排序</th><th>状态</th><th>操作</th></tr></thead><tbody id="adminCategoryTable"></tbody></table>
            </div>
        </section>

        <section class="admin-panel">
            <div class="section-title"><h1>AI 评价分析</h1><button class="secondary-btn" type="button" id="refreshAnalysisBtn">分析</button></div>
            <div class="analysis-box" id="analysisBox"></div>
        </section>

        <section class="admin-panel wide">
            <h1>菜品管理</h1>
            <form class="dish-form" id="dishForm">
                <select id="adminDishCategory"></select>
                <input id="adminDishName" placeholder="菜品名称">
                <input id="adminDishPrice" type="number" min="0.01" step="0.01" placeholder="价格">
                <input id="adminDishStock" type="number" min="0" placeholder="库存">
                <input id="adminDishTags" placeholder="口味标签">
                <input id="adminDishIngredients" placeholder="主要食材">
                <input id="adminDishImage" placeholder="图片地址">
                <textarea id="adminDishDescription" rows="3" placeholder="菜品描述"></textarea>
                <label class="check-label"><input id="adminDishAvailable" type="checkbox" checked>上架</label>
                <button class="primary-btn" type="submit" id="dishSaveBtn">保存菜品</button>
                <button class="secondary-btn" type="button" id="generateDescBtn">AI 描述</button>
                <button class="ghost-btn" type="button" id="dishResetBtn">重置</button>
            </form>
            <div class="table-wrap">
                <table><thead><tr><th>菜品</th><th>分类</th><th>价格</th><th>库存</th><th>销量</th><th>状态</th><th>操作</th></tr></thead><tbody id="adminDishTable"></tbody></table>
            </div>
        </section>

        <section class="admin-panel wide">
            <div class="section-title"><h1>订单管理</h1><button class="secondary-btn" type="button" id="refreshAdminOrdersBtn">刷新</button></div>
            <div class="table-wrap">
                <table><thead><tr><th>订单号</th><th>用户</th><th>金额</th><th>状态</th><th>下单时间</th><th>操作</th></tr></thead><tbody id="adminOrderTable"></tbody></table>
            </div>
        </section>
    </div>
</main>
<div class="toast" id="toast" role="status" aria-live="polite"></div>
</body>
</html>
